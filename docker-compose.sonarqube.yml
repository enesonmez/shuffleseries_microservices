services:
  # 1. SonarQube Veritabanı
  sonarqube_db:
    image: postgres:16-alpine
    container_name: shuffleseries_sonarqube_db
    environment:
      POSTGRES_USER: ${SONARQUBE_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonar}
      POSTGRES_DB: ${SONARQUBE_DB_NAME:-sonarqube}
    networks:
      - sonarqube_network
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data

  # 2. SonarQube Server
  sonarqube:
    image: sonarqube:community
    container_name: shuffleseries_sonarqube
    depends_on:
      - sonarqube_db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube_db:5432/${SONARQUBE_DB_NAME:-sonarqube}
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonar}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    networks:
      - sonarqube_network
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  sonarqube_network:
    driver: bridge